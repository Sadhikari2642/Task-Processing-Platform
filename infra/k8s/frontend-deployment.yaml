apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: task-platform
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ORG/task-frontend:latest
          ports: [{ containerPort: 80 }]
          resources:
            limits: { cpu: "200m", memory: "256Mi" }
