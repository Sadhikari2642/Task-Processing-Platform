apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: task-platform
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: ghcr.io/ORG/task-backend:latest
          ports: [{ containerPort: 4000 }]
          resources:
            limits: { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: "/", port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: "/", port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 5
