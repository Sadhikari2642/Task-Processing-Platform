apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: task-platform
spec:
  replicas: 3
  selector:
    matchLabels: { app: worker }
  template:
    metadata: { labels: { app: worker } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          image: ghcr.io/ORG/task-worker:latest
          ports:
            - containerPort: 8080
          resources:
            limits: { cpu: "300m", memory: "256Mi" }
            requests: { cpu: "100m", memory: "128Mi" }
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: MONGO_URI
              value: mongodb://mongo:27017/tasks
